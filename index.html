<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050505" />
  <!-- Title and all metadata are injected per route by the SEO component
       (vite-react-ssg Head, backed by react-helmet-async) and prerendered into
       every page. Nothing is declared here: a static title tag would be
       appended rather than replaced, creating a duplicate. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Animation frames, brand logo, and product images are served from Cloudinary
       — open the connection early so the LCP frame isn't blocked on DNS/TLS. -->
  <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
